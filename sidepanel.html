<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>King Translator AI</title>
    <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
    <div class="container">
        <button id="webpage-trans" class="panel-button">
            <span class="icon"></span>
            <span class="label">Webpage Trans</span>
        </button>
        <button id="ocr-region-trans" class="panel-button">
            <span class="icon"></span>
            <span class="label">OCR Region Trans</span>
        </button>
        <button id="web-image-trans" class="panel-button">
            <span class="icon"></span>
            <span class="label">Web Image Trans</span>
        </button>
        <button id="manga-web-trans" class="panel-button">
            <span class="icon"></span>
            <span class="label">Manga Web Trans</span>
        </button>
        <button id="image-file-trans" class="panel-button">
            <span class="icon"></span>
            <span class="label">Image File Trans</span>
        </button>
        <button id="media-file-trans" class="panel-button">
            <span class="icon"></span>
            <span class="label">Media File Trans</span>
        </button>
        <button id="file-translate" class="panel-button">
            <span class="icon"></span>
            <span class="label">File Translate</span>
        </button>
        <button id="translate-vip" class="panel-button">
            <span class="icon"></span>
            <span class="label">Translate VIP</span>
        </button>
        <button id="king-ai-settings" class="panel-button">
            <span class="icon"></span>
            <span class="label">King AI Settings</span>
        </button>
    </div>
    <script src="js/sidepanel.js"></script>
</body>
</html>
